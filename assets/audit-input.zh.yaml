# 抖音小游戏提审审核输入模板
# 首次填写后建议保存到：资料包目录/.douyin-minigame-audit/projects/<项目名称>/audit-input.yaml
# 路径字段请填写本地路径，支持绝对路径或相对路径。
# 示例：D:/Project/AuditPackage/icon.png 或 Assets/Submit/icon.png
# 如果你是研发人员，法务/运营/商务资料可以先留空，并在「待补资料」里写责任方。

游戏信息:
  # 官方要求：小游戏名称需与软著、版号保持一致；名称长度建议按 4-20 个字符检查。
  游戏名称: ""
  # 项目简称：用于下次说简称时找到旧项目档案，例如内部代号、常用简称、AppID。
  项目简称:
    - ""
  软著名称: ""
  备案名称: ""
  版号名称: ""
  版本号: ""
  引擎: "Unity 2022.3.62f3"
  平台: "抖音小游戏"

  # 选择输入：参考下方「官方选项参考 > 游戏一级类别可选」填写。
  游戏一级类别: "休闲"
  # 选择输入：参考下方「官方选项参考 > 休闲二级类别可选 / 中重度二级类别可选」填写。
  游戏二级类别: "休闲竞技"
  # 选择输入：参考下方「官方选项参考 > 休闲三级类别常用可选 / 中重度三级类别常用可选」填写。
  游戏三级类别: "其他休闲竞技"
  # 选择输入：参考下方「官方选项参考 > 题材可选」填写。
  题材: "休闲类游戏"
  # 选择输入：参考下方「官方选项参考 > 画风可选」填写。
  画风: "可爱卡通"
  # 选择输入：参考下方「官方选项参考 > 适龄提示可选 / 适龄提示简要判断」填写。
  适龄提示: "8+"

目录:
  # 资料包目录：建议放提审 YAML、图标、截图、视频、资质材料等。
  资料包目录路径: ""
  # 工程项目目录：可填写 Unity / Godot / HTML 项目根目录，作为增强扫描项。
  工程项目目录路径: ""
  构建产物目录路径: ""

提审文案:
  # 官方要求：一句话简介需明确介绍玩法，建议 10-60 个字符，最多不超过 60 个字符。
  # 示例：轻松上手的多人休闲竞技小游戏
  一句话简介: ""

  # 官方要求：详细介绍 120-300 字；建议写清游戏背景、角色、场景、玩法、功能、特点和使用方法。
  # 示例写法：玩家将扮演...在...场景中，通过...操作完成...目标。
  详细介绍: |
    请填写 120-300 字详细介绍，描述真实核心玩法，不要写广告宣传、自夸、引流或测试信息。

  # 版本更新时填写；首次提审可写「首次上线」或留空。
  更新说明: ""
  关键词:
    - "休闲"
    - "竞技"

素材:
  # 图标路径：本地图片路径；官方支持 png、bmp、jpeg、jpg、gif。
  # 审核重点：主体清晰、无二维码/电话/微信号/抖音号/官网/外部水印/红点/NEW/HOT/官方角标。
  图标路径: ""

  # 截图路径：建议填写实际玩法截图，避免货不对板或纯宣传图。
  截图路径列表:
    - ""

  # 视频封面路径：如有短视频锚点、推广视频或素材封面，请填写本地图片路径。
  视频封面路径列表:
    - ""

  # 宣传视频路径：本地视频路径；用于检查视频内容是否与真实玩法一致。
  宣传视频路径列表:
    - ""

  加载图路径: ""
  海报路径列表:
    - ""

能力与玩法:
  是否多人联机: false
  是否排行榜: false
  是否聊天: false
  是否UGC: false
  是否分享: false
  # sidebar_revisit_required: 抖音小游戏必接能力；需通过官方接口完成侧边栏复访引导与回访识别。
  是否接入侧边栏复访能力: false
  侧边栏复访说明: ""
  是否定位: false
  是否登录: true
  是否收集个人信息: false
  是否面向未成年人: true
  是否含随机抽取: false
  是否含概率公示: false
  是否含血腥暴力: false
  是否含赌博棋牌: false
  是否含外链跳转: false
  是否恐怖题材: false # 参考下方：官方选项参考 > 适龄提示简要判断；恐怖类通常默认 16+。
  是否恋爱婚恋系统: false # 参考下方：官方选项参考 > 适龄提示简要判断；情侣/恋爱/婚恋系统通常默认 16+。

运营与变现:
  是否广告变现: false
  广告类型:
    激励视频: false
    插屏: false
    Banner: false
    原生广告: false
  是否内购: false
  内购内容:
    - ""
  是否短视频锚点: false
  # 选择输入：如有短视频锚点，参考实际合作/投放方式勾选。
  锚点变现方式:
    CPA: false
    CPT: false
    CPM: false
    CPS: false
  是否流量推广: false
  是否游戏站: false
  是否剪映模板: false
  是否合集类游戏: false

资质与合规:
  # 资质材料均填写本地文件或目录路径。
  # 研发人员暂时无法提供的内容可以先留空，审计报告会把它们列入「缺失资料与责任方」。
  软著文件路径: ""
  版号或批文文件路径: ""
  备案材料目录路径: ""
  隐私政策文件路径: ""
  用户协议文件路径: ""
  授权文件路径列表:
    - ""
  营业执照或主体材料路径: ""

自查说明:
  # 不确定的问题可以写在这里，审核时会重点看。
  已知风险:
    - ""
  待补资料:
    - 资料名称: ""
      责任方: "法务/运营/商务/财务/发行/研发"
      说明: ""
  希望重点检查:
    - "基础信息"
    - "图标截图"
    - "广告内购"
    - "内容与行为规范"
  备注: ""

